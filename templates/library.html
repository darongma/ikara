{% extends "base.html" %}

{% block title %}{{ t.nav_library }}{% endblock %}

{% block content %}

<div class="library-controls">
    <div class="search-row now-playing-card">
        <input type="text" id="libSearch" placeholder="{{ t.search_placeholder }}"/>
    </div>
    
    <div class="sort-row">
    <span>{{ t.label_sort_by }}:</span>
    <a href="#" class="sort-link active" data-sort="created_at">{{ t.sort_date }}</a>
    <a href="#" class="sort-link" data-sort="rank">{{ t.sort_rank }}</a>
    <a href="#" class="sort-link" data-sort="title">{{ t.sort_title }}</a>
    <a href="#" class="sort-link" data-sort="artist">{{ t.sort_artist }}</a>
    </div>
    <div id="libsongCountDisplay" class="sort-row"></div>
</div>

<div id="libraryList" class="song-grid interactive-list"></div>
<div id="artistIndex" class="artist-index"></div>

<div id="editModal" class="modal-overlay">
    <div class="modal-card">
        <div class="modal-header">
            <img style="width:50px;" src="/static/karaoke.png"/>
            <h3 style="margin-right: auto; padding-left:10px;">{{ t.modal_edit_title }}</h3>
            <button class="close-x" onclick="closeModal()">
                <img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAADAAAAAwCAYAAABXAvmHAAAACXBIWXMAAAsTAAALEwEAmpwYAAABK0lEQVR4nO2Z/QnCMBDF6y42qcU1BMEJJeE2qE11Dp1CFHdQIkEKKta29lrvyj3ovy+/l48muUSRSCQSiYaSj/yErb/VThudH0y8mfXhD7NdHPxtks3Rzddqm1jlTlY7b1R+xg4BD/hj8LfaXVBDPMOXH2YIeIX3qCHCnDQq37+ZP0Lo/GjSYtrF36TF9AN82Ul7lDVR0UOdR6Iv30EaGxQeu9G/wGM1/lf4rhAk4H+FIQXfFookfKlaOFUsycI3C+GupOGbhCAP3yYEWfhSkBQLoyunzc3G2SqiKuA8AsB5DcC3v1D1dKIRAjjvA8B5JwbOZyHgfBoFzvcB4HwjA853YuBclfA1daEA0cUfvofAqQuFmijbytynEOxqo6OoTo/ifUAkEolEo9QdHgweYFAnKhYAAAAASUVORK5CYII=" alt="multiply">
            </button>
        </div>
        
        <div class="modal-body">
            <img id="editThumb" class="modal-thumb" src="" alt="Thumbnail">
            
            <input type="hidden" id="editId" />
            
            <div class="input-group">
                <label>{{ t.label_title }}</label>
                <input type="text" id="editTitle" placeholder="{{ t.placeholder_title }}" />
            </div>
            
            <div class="input-group">
                <label>{{ t.label_artist }}</label>
                <input type="text" id="editArtist" placeholder="{{ t.placeholder_artist }}" />
            </div>

            <div class="input-group">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px;">
                    <label style="margin-bottom: 0;">{{ t.label_lyrics }}</label>
                    <button onclick="autoUpdateLyrics(this)" class="btn-small" title="{{ t.title_auto_fetch }}">⚡</button>
                </div>
                <textarea id="editLyrics" rows="7" placeholder="[00:12.34] ..."></textarea>
            </div>

        </div>
